services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: nebula
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  web:
    build: .
    restart: always
    command: ./entrypoint.sh
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    depends_on:
      - db
    volumes:
      - .:/app

volumes:
  postgres_data:
